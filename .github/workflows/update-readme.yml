name: Update README with Activity

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update README Activity
        uses: Readme-Workflows/recent-activity@v2
        with:
          GH_USERNAME: Pratt999
          MAX_LINES: 5

      - name: Commit changes
        run: |
          git config --global user.name "Prat"
          git config --global user.email "you@example.com"
          git add .
          git commit -m "Updated README activity" || echo "No changes"
          git push