name: Update README with Activity

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update recent activity
        uses: Readme-Workflows/recent-activity@v2
        with:
          GH_USERNAME: Pratt999
          MAX_LINES: 5

      - name: Commit changes
        run: |
          git config --global user.name "Pratt999"
          git config --global user.email "you@example.com"
          git add .
          git commit -m "chore: update README activity" || echo "No changes"
          git push