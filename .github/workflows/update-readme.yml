name: Update README with Activity

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update recent activity
        uses: Readme-Workflows/recent-activity@main
        with:
          GH_USERNAME: SuryaRaikuni

      - name: Commit changes
        run: |
          git config --global user.name "SuryaRaikuni"
          git config --global user.email "suryapratap4500@gmail.com"
          git add .
          git diff --cached --quiet || git commit -m "chore: update README activity"
          git push